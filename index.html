<!DOCTYPE html>
<html>
   <head>
      <title>登山足跡</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <link rel="stylesheet" href="https://unpkg.com/leaflet@0.7.7/dist/leaflet.css" />
      <style>
         body {
         padding: 0;
         margin: 0;
         }
         html, body, #map {
         height: 100%;
         width: 100vw;
         }
      </style>
      <script src="https://unpkg.com/leaflet@0.7.7/dist/leaflet.js"></script>

   </head>

   <body>
      <div id = "map" style = "width: 100%"></div>
      <script>
         // Creating map options
         var mapOptions = {
            center: [23.59322, 121.01921],
            zoom: 8
         }
         // Creating a map object
         var map = new L.map('map', mapOptions);
         // Creating a Layer object
         var layer = new L.tileLayer('https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token={accessToken}', {
           attribution: '小山仔的足跡',
           maxZoom: 18,
           id: 'mapbox/streets-v11',
           tileSize: 512,
           zoomOffset: -1,
           accessToken: 'pk.eyJ1IjoiaGdrdHFrbW12IiwiYSI6ImNrZmt4Z2x4czFqM3QyeG52azVzd3R6b3gifQ.3aUejsEzyeHjaqLCv9YAPw'
         }).addTo(map);
         // Adding layer to the map
         map.addLayer(layer);
         // 增加自己的百岳log
         var popup = L.popup();
         function onMapClick(e) {
           popup
            .setLatLng(e.latlng)
            .setContent("You clicked the map at " + e.latlng.toString())
            .openOn(map);}
         map.on('click', onMapClick);
         var peak005 = L.marker([24.3834112, 121.2317647]).addTo(map);
         peak005.bindPopup("<b>雪山</b>&emsp;百岳#2;五嶽-2&emsp;🏔3884m<br>🗓2018.08 &Bruce 雪劍線四日D1<br>"
                           + "第一次D1就上主峰到翠池過夜，走得有點累，經過主峰剛好開始起雲，快到翠池時下了一下陣雨，傍晚對著山屋，可以看到夕陽灑在山屋後面的北稜角上，非常漂亮。<br>"
                           + "🗓2020.09 &Bruce 雪山西稜五日D2<br>"
                           + "今天輕鬆耍廢，天氣大好心情也好，在山頂玩了一小時，後來下翠池也吃飽睡好午休😁<br><img src='https://i.imgur.com/6xBd9xu.jpg'>").openPopup();
         var peak015 = L.marker([24.1183430, 121.3345488]).addTo(map);
         peak015.bindPopup("<b>奇萊北峰</b>&emsp;百岳#16;十峻-5&emsp;🏔3607m<br>🗓2018.11 &鴨 奇萊主北二日D1<br>"
                          + "出發前一天晚上感冒變重，今天走得很累，後來開始路邊休息馬上秒睡，今天要紮營在稜線，上到北峰很可惜一片白牆，小小遺憾。<br><img src='https://i.imgur.com/tmG7M6c.jpg'>").openPopup();
         var peak017 = L.marker([24.34091, 121.20047]).addTo(map);
         peak017.bindPopup("<b>大劍山</b><br>🏔3593m").openPopup();
         var peak020 = L.marker([24.0859950, 121.3232395]).addTo(map);
         peak020.bindPopup("<b>奇萊主峰</b>&emsp;百岳#20;九峨-2&emsp;🏔3560m<br>🗓2018.11 &鴨 奇萊主北二日D2<br>"
                          + "因為感冒關係，第一次在山上睡到早上七點才起床，當然也來不及去主峰看日出了，不過今天天氣還不錯，所以一路上還是玩得很享受，鴨也玩得很開心。<br><img src='https://i.imgur.com/XMocU6n.jpg'>").openPopup();
         var peak022 = L.marker([24.42825, 121.26677]).addTo(map);
         peak022.bindPopup("<b>品田山</b>&emsp;百岳#24;十峻-7&emsp;🏔3524m<br>🗓2020.05 &鴨 品田池有二日D1<br>"
                           + "中午走到新達山屋後續行，結果到山頂時整面白牆殘念😑<br><img src='https://i.imgur.com/0FOFF5e.jpg'>").openPopup();
         var peak023 = L.marker([24.3307510, 121.1211969]).addTo(map);
         peak023.bindPopup("<b>大雪山</b>&emsp;百岳#23;十崇-3&emsp;🏔3530m<br>🗓2020.09 &Bruce 雪山西稜五日D4<br>"
                           + "昨晚的奇俊山營地很棒展望也很棒，傍晚紮完營地馬上下了陣雨，今天早上開始天氣就不好都走在霧裡，可惜看不到展望，萌生之後想再走一次這段路線的念頭。<br><img src='https://i.imgur.com/rRgR1uM.jpg'>").openPopup();
         var peak026 = L.marker([24.3596007, 121.1407355]).addTo(map);
         peak026.bindPopup("<b>頭鷹山</b>&emsp;百岳#26;九峨-3&emsp;🏔3510m<br>🗓2020.09 &Bruce 雪山西稜五日D3<br>"
                           + "早上在火石山天空就有點陰，陡升離開森林後以為快到了，沒想到還要繼續往前且從後面繞上頭鷹山頂，但頭鷹山從遠方看好威武！<br><img src='https://i.imgur.com/canu4fb.jpg'>").openPopup();
         var peak027 = L.marker([24.4577542, 121.2579627]).addTo(map);
         peak027.bindPopup("<b>大霸尖山</b>&emsp;百岳#28;三尖-2&emsp;🏔3492m<br>🗓2020.10 &鴨,彭,chu,酸梅,阿修,cifa<br>"
                          + "大霸北稜未竟三日D2<br>"
                          + "這次天氣非常好，不過因為阿修腳痛，所以原本出鎮西堡改回大鹿林道出去，不過這次天氣好到沒什麼遺憾的。<br><img src='https://i.imgur.com/ntj9wl5.jpg'>").openPopup();
         var peak032 = L.marker([24.45563, 121.2521]).addTo(map);
         peak032.bindPopup("<b>小霸尖山</b>&emsp;百岳#36;八銳-2&emsp;🏔3418m<br>🗓2020.10 &鴨,彭,chu,酸梅,阿修,cifa<br>"
                          + "大霸北稜未竟三日D2<br>"
                          + "阿修狀況不好所以沒有續走小霸，回程時剛好黃昏，看到非常美的晚霞。<br><img src='https://i.imgur.com/yEsea0K.jpg'>").openPopup();
         var peak034 = L.marker([24.1815, 121.28165]).addTo(map);
         peak034.bindPopup("<b>合歡北峰</b><br>🏔3422m").openPopup();
         var peak035 = L.marker([24.13572, 121.28116]).addTo(map);
         peak035.bindPopup("<b>合歡東峰</b><br>🏔3416m").openPopup();
         var peak036 = L.marker([24.14263, 121.27121]).addTo(map);
         peak036.bindPopup("<b>合歡主峰</b><br>🏔3416m").openPopup();
         var peak039 = L.marker([24.2136036, 121.3471507]).addTo(map);
         peak039.bindPopup("<b>畢祿山</b>&emsp;百岳#39;八瘦-3&emsp;🏔3371m<br>🗓2015.05 &Berlin 畢羊縱走三日D2<br>"
                          + "昨天中午到林道口，走到水源營地休息後，取水💧時遇到獨走的Bruce剛到，他問了一下水源在哪後，就順便問隔天可不可一起走，就這樣開始了我們之後的爬山友誼，不過第二天要開始拔營"
                          + "上畢祿山時他想上廁所所以我跟Berlin先上去，後來我們在山頂休息時才碰頭。畢祿山頭展望遠方的北二段。這次是繼雪山大家一起走之後。第一次跟Berlin的爬山行程。<br><img src='https://i.imgur.com/LkJ7i7V.jpg'>").openPopup();
         var peak041 = L.marker([24.06121, 121.2798]).addTo(map);
         peak041.bindPopup("<b>奇萊南峰</b><br>🏔3357m").openPopup();
         var peak047 = L.marker([24.3577758, 121.2513318]).addTo(map);
         peak047.bindPopup("<b>志佳陽大山基點峰</b>&emsp;百岳#44;八秀-4&emsp;🏔3327m<br>🗓2019.11 &鴨 志佳楊大山單攻<br>"
                          + "清晨從家裡出發，白天天氣不錯，過了瓢單山屋後，展望大開，鴨玩得很開心，山頂煮了泡麵吃飽後到最高點看完風景後就下山。<br><img src='https://i.imgur.com/NOMvOKU.jpg'>").openPopup();
         var peak048 = L.marker([24.4326327, 121.3049212]).addTo(map);
         peak048.bindPopup("<b>桃山</b>&emsp;百岳#49;八秀-5&emsp;🏔3324m<br>🗓2020.07 &鴨,amy,偉偉,曬黑,彭,酸梅,汪<br>桃山喀拉業二日D2<br>"
                          + "因為桃山山屋缺水，所以背水上來，昨晚到營地傍晚，今天早上在桃山山頂風景非常漂亮，也看了日出，雖然有被雲擋住部份但還是非常美！<br><img src='https://i.imgur.com/2ZUEUi6.jpg'>").openPopup();
         var peak049 = L.marker([24.30663, 121.18801]).addTo(map);
         peak049.bindPopup("<b>佳陽山</b><br>🏔3313m🏔").openPopup();
         var peak050 = L.marker([24.3819312, 121.1750686]).addTo(map);
         peak050.bindPopup("<b>火石山</b>&emsp;百岳#51;八銳-5&emsp;🏔3309.56m<br>🗓2020.09 &Bruce 雪山西稜五日D3<br>"
                           + "前晚D2很廢還在營地洗衣服休息聊天，所以今天D3早上才上火石山看風景跟打卡，展望很棒！上火石山前還經過祖先居住的遺址，小小感動。<br><img src='https://i.imgur.com/RznhkZl.jpg'>").openPopup();
         var peak051 = L.marker([24.4313152, 121.2881716]).addTo(map);
         peak051.bindPopup("<b>池有山</b>&emsp;百岳#52;六易-1&emsp;🏔3303m<br>🗓2020.05 &鴨 品田池有二日D1<br>"
                           + "山頂遇到很多網美還有比基尼妹，隔天摸早黑下山不小心重裝又上了池有山頭😅<br><img src='https://i.imgur.com/rhwG6d0.jpg'>").openPopup();
         var peak052 = L.marker([24.4700063, 121.2436608]).addTo(map);
         peak052.bindPopup("<b>伊澤山</b>&emsp;百岳#53;六易-2&emsp;🏔3297m<br>🗓2020.10 &鴨,彭,chu,酸梅,阿修,cifa<br>"
                          +  "大霸北稜未竟三日D2<br>"
                          + "大小霸因為玩的太盡興，所以也玩得有點晚了，走到伊澤山也開始出現晚霞了，還有大雲海，很漂亮的畫面。隔天因為阿修腳狀況不好，所以提早跟他一起下山，這次就沒有去加利山了。<br><img src='https://i.imgur.com/kcIr9WI.jpg'>").openPopup();
         var peak060 = L.marker([24.1492933, 121.3429479]).addTo(map);
         peak060.bindPopup("<b>屏風山</b>&emsp;百岳#65;九嶂-6&emsp;🏔3250m<br>🗓2019.04 屏風山新路三日D2<br>"
                          + "屏風山新路很好走，這次又排三天，鴨還在歐洲玩，所以自己準備了牛排🥩跟咖喱🍛打算在營地好好的休息跟吃頓好的，營地是在大片的樹林之下，而且地勢平緩"
                          + "，旁邊還有溪流，所以可以很悠哉的過了兩夜的晚上，不過屏風山頂腹地很小沒有什麼展望，所以我覺得特色是這裡有很讚的營地很值得來。<br><img src='https://i.imgur.com/3WcqXM3.jpg'>").openPopup();
         var peak063 = L.marker([24.2443803, 121.3516603]).addTo(map);
         peak063.bindPopup("<b>鈴鳴山</b>&emsp;百岳#60;八秀-6&emsp;🏔3272.34m<br>🗓2019.10 &鴨 鈴鳴閂山二日D2<br>"
                          + "紮營在林道水源處💧，登山口在林道底，登山口之後陡上到稜線，出了森林展望大開，今年下半年爬山天氣都很不錯，在山頂廢一波後下山，原本計畫是直接回梨山，"
                           + "但好天氣好心情，就在路上找到一個有展望的地方多紮營一晚，帳篷外還看得到夕陽灑在南湖大山上，很愜意的一天。<br><img src='https://i.imgur.com/vywjI8q.jpg'>").openPopup();
         var peak065 = L.marker([23.4756000, 120.9176500]).addTo(map);
         peak065.bindPopup("<b>玉山前峰</b>&emsp;百岳#69;六易-5&emsp;🏔3236m<br>🗓2020.09 &鴨.酸梅 玉山前鋒單攻<br>"
                           + "天氣陰陰的，雖然走起來很舒服但山頂沒有展望，山頂前有一段石塊波，剛近玉山登山口，抬頭看到前方的山頭就是玉山前鋒。<br><img src='https://i.imgur.com/k2mGFFB.jpg'>").openPopup();
         var peak066 = L.marker([24.15246, 121.28458]).addTo(map);
         peak066.bindPopup("<b>石門山</b><br>🏔3236m").openPopup();
         var peak067 = L.marker([24.29551, 121.17033]).addTo(map);
         peak067.bindPopup("<b>劍山</b><br>🏔3223m").openPopup();
         var peak074 = L.marker([24.3887653, 121.2720305]).addTo(map);
         peak074.bindPopup("<b>雪山東峰</b>&emsp;百岳#75;八小巒-3&emsp;🏔3199m<br>🗓2018.08 &Bruce 雪劍線四日D1<br>"
                           + "東峰往向停機坪方向，後方可見369山屋以及雪山主峰。<img src='https://i.imgur.com/uNU9EUK.jpg'><br>"
                           + "🗓2020.09 &Bruce 雪山西稜五日D1<br>"
                           + "今天中午出發踢到黑熊營地").openPopup();
         var peak075 = L.marker([24.03937, 121.28592]).addTo(map);
         peak075.bindPopup("<b>南華山</b><br>🏔3183m").openPopup();
         var peak079 = L.marker([24.3364724, 121.0780097]).addTo(map);
         peak079.bindPopup("<b>中雪山</b>&emsp;百岳#79;十翠-8&emsp;🏔3172m<br>🗓2020.09 &Bruce 雪山西稜五日D4<br>"
                           + "今天整天雨衣都溼的，到登山口大概2點多，剛要出發突然雨勢更大還打雷，當下停下捱猶豫了一下是否還要繼續上山，中雪山沿途都沒有展望，最後還是在雷聲大雨中走到山頂😫<br><img src='https://i.imgur.com/DwTsUoM.jpg'>").openPopup();
         var peak080 = L.marker([24.2587295, 121.3099247]).addTo(map);
         peak080.bindPopup("<b>閂山</b>&emsp;百岳#80;八秀-8&emsp;🏔3168m<br>🗓2019.10 &鴨 鈴鳴閂山二日D1<br>"
                          + "早上騎沙灘車走720林道通行無阻，天氣不錯，在閂山登山口放重裝改輕裝前往閂山，沿路展望很好，走得很悠閒，下山時天也轉黃昏了，對面的北一段的光線因為角度關係被遮掉一半"
                          + "看起來很特別，出登山口後摸點小黑就找到水源處💧紮營了，今天比想像中多人，但我們還是找到個不錯的營地，準備煮好料吃。<img src='https://i.imgur.com/2XmC6gZ.jpg'>").openPopup();
         var peak083 = L.marker([24.17767, 121.24453]).addTo(map);
         peak083.bindPopup("<b>合歡西峰</b><br>🏔3144m").openPopup();
         var peak084 = L.marker([24.3802, 121.41746]).addTo(map);
         peak084.bindPopup("<b>審馬陣山</b><br>🏔3139m").openPopup();
         var peak085 = L.marker([24.4500222, 121.3212902]).addTo(map);
         peak085.bindPopup("<b>喀拉業山</b>&emsp;百岳#84;六肩稜-2&emsp;🏔3132m<br>🗓2020.07 &鴨,amy,偉偉,曬黑,彭,酸梅,汪<br>桃山喀拉業二日D2<br>"
                           + "喀拉業山頂的展望的確不大，不過往喀拉業的路上其實很有看頭，大家沿路玩的蠻開心的。<br><img src='https://i.imgur.com/ifDUEWf.jpg'>").openPopup();
         var peak087 = L.marker([24.45952, 121.21622]).addTo(map);
         peak087.bindPopup("<b>加利山</b><br>🏔3111m").openPopup();
         var peak092 = L.marker([22.6270765, 120.7613767]).addTo(map);
         peak092.bindPopup("<b>北大武山</b>&emsp;百岳#90;五嶽-5&emsp;🏔3092m<br>🗓2014.02 &Berlin 北大武三日D2<br>"
                           + "大概是目前看過最美的雲海之一了，名不虛傳，尤其黃昏的光灑在雲海上面。<br><img src='https://i.imgur.com/i1MYLfO.jpg'>").openPopup();
         var peak097 = L.marker([23.69399, 120.94723]).addTo(map);
         peak097.bindPopup("<b>(西)巒大山</b><br>🏔3042m").openPopup();
         var peak100 = L.marker([24.2082521, 121.3797945]).addTo(map);
         peak100.bindPopup("<b>羊頭山</b>&emsp;百岳#96;八瘦-8&emsp;🏔3035m<br>🗓2015.05 &Berlin,Bruce 畢羊縱走三日D3<br>"
                          + "前一晚紮在最後營地，水背有剩剛好給Bruce，今晚Bruce跟我們紮在一起。不過有點忘記當時在羊頭山的展望了，年代久遠。"
                          + "這次我們縱走。剛好遇到大學學弟兩天分別從兩邊單攻兩座山頭，而且順序剛好跟我們顛倒，所以我們兩方剛好各自藏寶留給對方去尋找。<br><img src='https://i.imgur.com/Mjrycrc.jpg'>").openPopup();
         </script>
   </body>

</html>
